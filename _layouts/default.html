<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    {% seo %}
</head>
<body class="reader-theme">
    <header class="site-header">
        <nav class="container">
            <a href="/" class="logo">mlcurve</a>
            <ul class="nav-links">
                <li><a href="/blog/">Blog</a></li>
                <li><a href="/notes/">Notes</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        {{ content }}
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; {{ site.title }}</p>
        </div>
    </footer>

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            }
        };
    </script>
    <script>
        document.querySelectorAll('pre code.language-math').forEach((codeEl) => {
            const preEl = codeEl.parentElement;
            const tex = codeEl.textContent.trim();
            const container = document.createElement('div');
            container.className = 'math-block';
            container.textContent = `$$\n${tex}\n$$`;
            preEl.replaceWith(container);
        });

        // Fallback: if inline LaTeX is accidentally parsed as inline code,
        // convert it back to inline TeX so MathJax can render it.
        document.querySelectorAll('.post-content p code, .post-content li code').forEach((codeEl) => {
            if (codeEl.closest('pre')) {
                return;
            }

            const text = codeEl.textContent.trim();
            const hasLatexCommand = /\\[a-zA-Z]+/.test(text);
            const hasScript = /[_^]/.test(text);
            const hasBraces = /[{}]/.test(text);
            const isUnicodeKet = /^\|\s*[^|]+\s*⟩$/.test(text);
            const isLikelyLatex = hasLatexCommand || (hasScript && hasBraces) || isUnicodeKet;
            const looksLikeCodeToken = /^[a-zA-Z0-9_.-]+$/.test(text);

            if (!isLikelyLatex || looksLikeCodeToken) {
                return;
            }

            const mathSpan = document.createElement('span');
            const tex = text
                .replace(/⟨/g, '\\langle')
                .replace(/⟩/g, '\\rangle')
                .replace(/^\$+|\$+$/g, '')
                .trim();
            mathSpan.textContent = `\\(${tex}\\)`;
            codeEl.replaceWith(mathSpan);
        });
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</body>
</html>
