---
layout: default
---
<article class="post">
    <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-meta">
            <time datetime="{{ page.date | date_to_xmlschema }}">
                {{ page.date | date: "%B %d, %Y" }}
            </time>
            {% if page.source %}
            <span class="separator">•</span>
            <span class="source">{{ page.source }}</span>
            {% endif %}
            <span class="separator">•</span>
            <a class="meta-back-link" href="/blog/" aria-label="Back to posts list">
                <span aria-hidden="true">&#x21A9;</span>
            </a>
        </div>
    </header>
    
    <div class="post-content">
        {{ content }}
    </div>
    
    <footer class="post-footer">
        {% if page.source_url %}
        <p>Source: <a href="{{ page.source_url }}" target="_blank">{{ page.source }}</a></p>
        {% endif %}
    </footer>
</article>

<div class="post-navigation">
    {% if page.previous.url %}
    <a href="{{ page.previous.url }}" class="prev-post" title="{{ page.previous.title }}"><-</a>
    {% endif %}
    
    {% if page.next.url %}
    <a href="{{ page.next.url }}" class="next-post" title="{{ page.next.title }}">-></a>
    {% endif %}
</div>
